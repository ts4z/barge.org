name: Build and Deploy HTML to Production

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    branches: [ "main" ]
  schedule:
    - cron: "55 8 * * *"        # after midnight Las Vegas, server time UTC

jobs:
  build-and-deploy-to-barge-dot-org:
    runs-on: ubuntu-latest
    environment: barge.org
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - name: checkout source
        uses: actions/checkout@v6
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod
          persist-credentials: false
      - name: Hugo setup
        # 3.2.1
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78
        with:
          hugo-version: 0.160.1
      - name: build site with hugo
        run: hugo --printPathWarnings --panicOnWarning --environment production
      - name: rsync 'public' to production host
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: burnett01/rsync-deployments@7.0.1
        with:
          path: public/
          remote_host: ${{ secrets.HOST }}
          remote_key: ${{ secrets.SSH_KEY }}
          remote_path: /var/www/newbarge/
          remote_port: ${{ secrets.PORT }}
          remote_user: ${{ secrets.USERNAME }}
          switches: -avzr --delete --exclude=".??*,*~"
