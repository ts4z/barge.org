{{- /*
Override of Hugo's internal alias (redirect) template.  Identical output,
except we emit an (empty) body element, which HTML5 requires.
*/ -}}
<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}">
  <head>
    <title>{{ .Permalink }}</title>
    <link rel="canonical" href="{{ .Permalink }}">
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="0; url={{ .Permalink }}">
  </head>
  <body></body>
</html>
