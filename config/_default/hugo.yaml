#
# This is the "default" (i.e., almost the only) config for barge.org.
# We have some overrides for a staging environment.
#
# Most of this is pretty stable but we do consult params.nextEvents
# and params.ctas below on most every page.
#

baseURL: https://www.barge.org/
languageCode: en-us
timeZone: America/Los_Angeles
title: BARGE.org
theme: ["barge-PaperMod"]
sectionPagesMenu: main
enableRobotsTXT: true
relativeURLS: true
taxonomies:
  tag: tags
params:
  env: production
  # Directories to scan in static directory for extra stuff for sitemap.xml.
  # See layouts/sitemap.xml.
  sitemapStaticDirectories:
    - "rulebook"
  description: >-
    This is the home page for the BARGE event in Las Vegas, the EMBARGO event
    in Las Vegas, the ATLARGE event in Atlantic City, and BARGE, Inc., which is
    a tax exempt Nevada corporation operating as a 501(c)(7) not-for-profit
    social club.
  mainSections:
    - atlarge
    - barge
    - embargo
    - blog
    - blog/trip-reports
    - news
  # Keep these short so they're one line on a phone.  35 characters is great,
  # 40 will probably wrap on an iPhone SE.
  # Each nextEvents / ctas entry may carry optional "after" and "until"
  # effective dates (YYYY-MM-DD).  These require a rebuild to take effect.
  nextEvents:
    # ..... 01234567890123456789012345678901234*6789* <-- r00ler
    - link: "/barge/2026/"
      text: "BARGE is July 20-25 at The Orleans"
      until: "2026-07-25"
    - link: "http://fargopoker.org/"
      text: "FARGO 2026 — October 16-18"
      after: "2026-08-01"
      until: "2026-10-19"
  # CTAs are added to (almost) all pages at the top in an obnoxious yellow box.
  # Each CTA should be made of a link and a display text.  Any number of CTAs
  # are supported, but try to limit yourself to one or two.  As with
  # nextEvents, these will wrap if they get too long.
  ctas:
    # ..... 01234567890123456789012345678901234*6789* <-- r00ler
    - link: https://www.zeffy.com/en-US/ticketing/barge--2026
      text: "Register now for BARGE 2026!"
      # Best guess.
      until: "2026-07-15"
    - link: /barge/2026/hotel/
      text: "Orleans Hotel block info (expires 6/26)"
      until: "2026-06-27"
  selfHosted: true
  socialShare: true
  showRelatedPosts: true
  # PaperMod stuff:
  showShareButtons: true
  ShareButtons:
    - "facebook"
    - "reddit"
    - "whatsapp"
    # - "x"
  ShowBreadcrumbs: true
  ShowPostNavLinks: true
  # editPost:
  #   URL: "https://github.com/ts4z/barge.org/tree/main/content"
  #   Text: "Suggest Changes" # edit text
  #   appendFilePath: true # to append file path to Edit link
  label:
    icon: /logos/barge_simple.png
  footer:
    text: ""
    hideCopyright: true
  disableSpecial1stPost: true
  # we do the footer by hand
  hideFooter: true
outputs:
  home:
    - HTML
    - RSS
